name: Update OWASP Dependency DB

on:
  workflow_dispatch:

 # pull_request:
 #   branches:
 #     - '**'

  schedule:
    - cron: '0 2 * * *'

jobs:
  update-owasp-db:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: adopt
          java-version: '17'
          cache: maven

      - name: Restore OWASP Dependency DB Cache
        uses: actions/cache@v4
        with:
          path: dependency-check-data
          key: dependency-check-${{ runner.os }}-v1
          restore-keys: |
            dependency-check-${{ runner.os }}-
      
      - name: Update OWASP Dependency DB
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        run: |
          mvn org.owasp:dependency-check-maven:update-only \
            -DnvdApiKey=$NVD_API_KEY \
            -DdataDirectory=dependency-check-data
      
      - name: Verify cache
        run: |
          ls -lah dependency-check-data
          du -sh dependency-check-data
